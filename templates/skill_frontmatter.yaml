# Spec (required)
name: lowercase-matches-parent-dir
description: >-
  <WHAT the skill does>. Use when <trigger scenarios / keywords / file types>.

# Spec (optional)
license: MIT
compatibility: Requires Python 3.10+
metadata:
  author: <name>
  version: "1.0"

# Spec (experimental)
allowed-tools: Bash(git add *) Bash(git commit *) Read  # support claude only
disable-model-invocation: true                          # support cursor + claude

# Spec (claude-only)
when_to_use: |
  Triggered by keywords: commit, review, PR, deploy.
argument-hint: "[issue-number] [branch]"
arguments: [issue, branch]
user-invocable: true
model: sonnet        # sonnet / opus / haiku / id / inherit
effort: medium       # low / medium / high / xhigh / max
context: fork        # When forking, run the body in an independent subagent context
agent: general-purpose
hooks:
  PreToolUse: ./hooks/<pre.sh>
  PostToolUse: ./hooks/<post.sh>
  Stop: ./hooks/<stop.sh>
paths:
  - "src/**/*.ts"
shell: bash          # bash / powershell
